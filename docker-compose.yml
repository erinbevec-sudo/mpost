services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mpost}
      POSTGRES_USER: ${POSTGRES_USER:-mpost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mpost}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mpost} -d ${POSTGRES_DB:-mpost}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://mpost:mpost@postgres:5432/mpost}
      MPOST_DEV_USER_EMAIL: ${MPOST_DEV_USER_EMAIL:-user@example.com}
      MPOST_DEV_USER_ROLE: ${MPOST_DEV_USER_ROLE:-user}
      LLM_PROVIDER: ${LLM_PROVIDER:-huggingface}
      HF_MODEL: ${HF_MODEL:-meta-llama/Llama-3.2-3B-Instruct}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src:ro
      - ./data:/app/data

volumes:
  postgres_data:
